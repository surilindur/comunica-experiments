services:
  jena:
    build:
      # https://github.com/apache/jena/tree/main/jena-fuseki2/jena-fuseki-docker
      context: https://github.com/apache/jena.git#main:jena-fuseki2/jena-fuseki-docker
      args:
        # https://hub.docker.com/_/alpine
        ALPINE_VERSION: 3
        # https://hub.docker.com/_/eclipse-temurin
        JAVA_VERSION: 24
        # start with 256MB, then go up until 2GB
        JAVA_OPTIONS: -Xms256m -Xmx2048m
        # https://repo1.maven.org/maven2/org/apache/jena/jena-fuseki-server/
        JENA_VERSION: 5.4.0
    command: --strict --config /fuseki/config.ttl
    network_mode: host
    volumes:
      - ./input/jena/config.ttl:/fuseki/config.ttl:ro
      - ./generated/out-fragments/http/localhost_3030/data.nt:/fuseki/data.nt:ro
  css:
    build:
      context: input/solidserver
      network: host
      args:
        - CONFIG_SERVER=config.json
        - LOG_LEVEL=info
        - BASE_URL=http://localhost:3000/
    network_mode: host
    volumes:
      - ./generated/out-fragments/http/localhost_3000:/data:ro
  comunica:
    build:
      context: ./input/comunica
      network: host
      args:
        - CONFIG_CLIENT=config.json
        - COMUNICA_PORT=4000
        - QUERY_TIMEOUT=60
        - MAX_MEMORY=8192
        - LOG_LEVEL=info
    network_mode: host
    volumes:
      - ./input/comunica/context-${BENCHMARK_SETUP}.json:/tmp/context.json:ro
